<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0a0e17">
<title>Süper Lig Tahmin</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@400;500;600&display=swap');

:root {
  --bg:      #0a0e17;
  --panel:   #111827;
  --kart:    #1a2235;
  --kart2:   #1e2a40;
  --vurgu:   #3b82f6;
  --yesil:   #22c55e;
  --sari:    #eab308;
  --kirmizi: #ef4444;
  --beyaz:   #f1f5f9;
  --gri:     #64748b;
  --border:  #1e2d45;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
  font-family: 'Barlow', sans-serif;
  background: var(--bg);
  color: var(--beyaz);
  min-height: 100vh;
  overflow-x: hidden;
}

/* İNDİRME BUTONU - üstte sabit */
.indir-bar {
  background: linear-gradient(135deg, #1a2a1a, #0f1f0f);
  border-bottom: 1px solid #22c55e44;
  padding: 8px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
}
.indir-bar span { font-size: 11px; color: #22c55e; }
.indir-btn {
  background: #22c55e;
  color: #0a0e17;
  border: none;
  border-radius: 6px;
  padding: 6px 14px;
  font-size: 12px;
  font-weight: 700;
  font-family: 'Barlow', sans-serif;
  cursor: pointer;
  letter-spacing: 0.5px;
  display: flex;
  align-items: center;
  gap: 5px;
  white-space: nowrap;
}

/* EKRANLAR */
.ekran { display: none; flex-direction: column; height: calc(100vh - 41px); }
.ekran.aktif { display: flex; }

/* HEADER */
.header {
  background: var(--panel);
  border-bottom: 1px solid var(--border);
  padding: 12px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky; top: 0; z-index: 10;
}
.header-sol { display: flex; flex-direction: column; }
.header h1 {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 22px; font-weight: 900;
  letter-spacing: 1px;
  background: linear-gradient(90deg, #3b82f6, #60a5fa);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
.header .tarih { font-size: 11px; color: var(--gri); margin-top: 1px; }

.scroll { flex: 1; overflow-y: auto; padding: 14px; -webkit-overflow-scrolling: touch; }

/* KARTLAR */
.kart {
  background: var(--kart);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 14px;
  margin-bottom: 12px;
}
.kart-baslik {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 13px; font-weight: 700;
  color: var(--gri);
  letter-spacing: 1px;
  text-transform: uppercase;
  margin-bottom: 10px;
}

/* TAKIMLAR */
.takim-sec {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 10px;
}
select {
  background: var(--kart2);
  color: var(--beyaz);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 12px;
  font-size: 13px;
  font-family: 'Barlow', sans-serif;
  width: 100%;
  -webkit-appearance: none;
  cursor: pointer;
}
select:focus { outline: none; border-color: var(--vurgu); }

/* ORAN GİRİŞ */
.oran-grid {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 8px;
  margin-bottom: 12px;
}
.oran-item { display: flex; flex-direction: column; gap: 4px; }
.oran-item label { font-size: 10px; color: var(--gri); letter-spacing: 0.5px; text-align: center; }
input[type="number"] {
  background: var(--kart2);
  color: var(--beyaz);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 9px 8px;
  font-size: 15px;
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 600;
  text-align: center;
  width: 100%;
}
input[type="number"]:focus { outline: none; border-color: var(--vurgu); }

/* BUTON */
.btn {
  width: 100%;
  padding: 13px;
  border: none;
  border-radius: 10px;
  font-size: 15px;
  font-weight: 700;
  font-family: 'Barlow Condensed', sans-serif;
  letter-spacing: 1px;
  cursor: pointer;
  transition: all 0.15s;
  text-transform: uppercase;
}
.btn:active { transform: scale(0.97); }
.btn-vurgu { background: var(--vurgu); color: white; }
.btn-yesil { background: var(--yesil); color: #0a0e17; }
.btn-sari  { background: var(--sari); color: #0a0e17; }
.btn-kirmizi { background: var(--kirmizi); color: white; }
.btn-gri { background: var(--kart2); color: var(--beyaz); border: 1px solid var(--border); margin-top: 8px; }

/* SONUÇ KUTUSU */
.sonuc-kutu {
  display: none;
  background: linear-gradient(135deg, #1a2a4a, #0f1a30);
  border: 1px solid #3b82f644;
  border-radius: 12px;
  padding: 14px;
  margin-bottom: 12px;
}
.sonuc-kutu.goster { display: block; }
.sonuc-mac {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 18px; font-weight: 800;
  text-align: center;
  margin-bottom: 12px;
  color: #60a5fa;
}
.sonuc-satirlar { display: flex; flex-direction: column; gap: 8px; }
.sonuc-satir {
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: rgba(255,255,255,0.04);
  border-radius: 8px;
  padding: 8px 12px;
}
.sonuc-etiket { font-size: 11px; color: var(--gri); letter-spacing: 0.5px; }
.sonuc-deger {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 16px; font-weight: 700;
}
.tahmin-badge {
  display: inline-block;
  padding: 4px 14px;
  border-radius: 20px;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 15px; font-weight: 800;
  letter-spacing: 1px;
  text-align: center;
  width: 100%;
  margin: 10px 0 4px;
}
.ev-kazanir    { background: rgba(34,197,94,0.15); color: var(--yesil); border: 1px solid #22c55e44; }
.beraberlik    { background: rgba(234,179,8,0.15); color: var(--sari);  border: 1px solid #eab30844; }
.dep-kazanir   { background: rgba(239,68,68,0.15); color: var(--kirmizi); border: 1px solid #ef444444; }

/* ARBİTRAJ */
.arb-kutu {
  background: rgba(234,179,8,0.06);
  border: 1px solid #eab30822;
  border-radius: 8px;
  padding: 10px 12px;
  margin-top: 8px;
  text-align: center;
}
.arb-pozitif { border-color: #22c55e44; background: rgba(34,197,94,0.06); }
.arb-baslik { font-size: 10px; color: var(--gri); letter-spacing: 1px; margin-bottom: 4px; }
.arb-deger {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 22px; font-weight: 900;
}
.arb-pozitif .arb-deger { color: var(--yesil); }
.arb-negatif .arb-deger { color: var(--sari); }

/* ALT NAV */
.alt-nav {
  background: var(--panel);
  border-top: 1px solid var(--border);
  display: flex;
  position: sticky; bottom: 0;
}
.nav-btn {
  flex: 1;
  background: none;
  border: none;
  color: var(--gri);
  padding: 10px 4px 8px;
  font-size: 9px;
  font-family: 'Barlow', sans-serif;
  font-weight: 600;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  cursor: pointer;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
  transition: color 0.15s;
}
.nav-btn .ikon { font-size: 18px; }
.nav-btn.aktif { color: var(--vurgu); }

/* GEÇMİŞ */
.gecmis-kart {
  background: var(--kart);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 12px;
  margin-bottom: 10px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 8px;
}
.gecmis-mac { font-family: 'Barlow Condensed', sans-serif; font-size: 14px; font-weight: 700; margin-bottom: 3px; }
.gecmis-tarih { font-size: 10px; color: var(--gri); }
.gecmis-badge {
  padding: 4px 10px;
  border-radius: 6px;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 12px; font-weight: 700;
  white-space: nowrap;
}
.dogru { background: rgba(34,197,94,0.15); color: var(--yesil); }
.yanlis { background: rgba(239,68,68,0.15); color: var(--kirmizi); }
.bekliyor { background: rgba(100,116,139,0.15); color: var(--gri); }

/* İSTATİSTİK */
.stat-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; margin-bottom: 12px; }
.stat-kutu {
  background: var(--kart);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 10px;
  text-align: center;
}
.stat-sayi { font-family: 'Barlow Condensed', sans-serif; font-size: 26px; font-weight: 900; }
.stat-etiket { font-size: 9px; color: var(--gri); letter-spacing: 0.5px; margin-top: 2px; }

/* MODAL */
.modal-arka {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.7);
  z-index: 100;
  align-items: flex-end;
  justify-content: center;
}
.modal-arka.acik { display: flex; }
.modal {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 16px 16px 0 0;
  padding: 20px 16px 30px;
  width: 100%;
  max-width: 480px;
  animation: slideUp 0.25s ease;
}
@keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
.modal-baslik {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 18px; font-weight: 800;
  text-align: center;
  margin-bottom: 16px;
}
.modal-mac { color: var(--vurgu); font-size: 15px; text-align: center; margin-bottom: 14px; }
.modal-butonlar { display: flex; flex-direction: column; gap: 8px; }
.bos { text-align: center; padding: 40px 20px; color: var(--gri); font-size: 13px; }
</style>
</head>
<body>

<!-- İNDİR BUTONU -->
<div class="indir-bar">
  <span>📱 Süper Lig Tahmin v2.0</span>
  <button class="indir-btn" onclick="dosyaIndir()">⬇ HTML İndir</button>
</div>

<!-- EKRAN 1: TAHMİN -->
<div class="ekran aktif" id="ekran-tahmin">
  <div class="header">
    <div class="header-sol">
      <h1>⚽ SÜPER LİG</h1>
      <span class="tarih" id="tarih-yazi"></span>
    </div>
  </div>
  <div class="scroll">

    <div class="kart">
      <div class="kart-baslik">🏟 Maç Seçimi</div>
      <div class="takim-sec">
        <select id="ev-takim"><option value="">Ev Sahibi</option></select>
        <select id="dep-takim"><option value="">Deplasman</option></select>
      </div>
    </div>

    <div class="kart">
      <div class="kart-baslik">📊 Bahis Oranları (opsiyonel)</div>
      <div class="oran-grid">
        <div class="oran-item">
          <label>EV KAZANIR (1)</label>
          <input type="number" id="oran-1" placeholder="1.80" step="0.01" min="1">
        </div>
        <div class="oran-item">
          <label>BERABERLİK (X)</label>
          <input type="number" id="oran-x" placeholder="3.40" step="0.01" min="1">
        </div>
        <div class="oran-item">
          <label>DEP. KAZANIR (2)</label>
          <input type="number" id="oran-2" placeholder="4.20" step="0.01" min="1">
        </div>
      </div>
    </div>

    <div class="sonuc-kutu" id="sonuc-kutu">
      <div class="sonuc-mac" id="sonuc-mac-adi"></div>
      <div class="tahmin-badge" id="tahmin-badge"></div>
      <div class="sonuc-satirlar" id="sonuc-detay"></div>
      <div class="arb-kutu" id="arb-kutu">
        <div class="arb-baslik">ARBİTRAJ DEĞERİ</div>
        <div class="arb-deger" id="arb-deger"></div>
      </div>
      <button class="btn btn-gri" onclick="sonucGirAc()">✏️ Gerçek Sonucu Gir</button>
    </div>

    <button class="btn btn-vurgu" onclick="tahminYap()">TAHMİN ET</button>
    <div style="height:20px"></div>
  </div>
  <div class="alt-nav">
    <button class="nav-btn aktif" onclick="sayfaGit('tahmin')"><span class="ikon">🎯</span>TAHMİN</button>
    <button class="nav-btn" onclick="sayfaGit('gecmis')"><span class="ikon">📋</span>GEÇMİŞ</button>
    <button class="nav-btn" onclick="sayfaGit('istatistik')"><span class="ikon">📈</span>İSTATİSTİK</button>
  </div>
</div>

<!-- EKRAN 2: GEÇMİŞ -->
<div class="ekran" id="ekran-gecmis">
  <div class="header">
    <h1>📋 GEÇMİŞ TAHMİNLER</h1>
    <button class="btn btn-gri" style="width:auto;padding:6px 12px;font-size:11px" onclick="gecmisTemizle()">Temizle</button>
  </div>
  <div class="scroll" id="gecmis-liste"></div>
  <div class="alt-nav">
    <button class="nav-btn" onclick="sayfaGit('tahmin')"><span class="ikon">🎯</span>TAHMİN</button>
    <button class="nav-btn aktif" onclick="sayfaGit('gecmis')"><span class="ikon">📋</span>GEÇMİŞ</button>
    <button class="nav-btn" onclick="sayfaGit('istatistik')"><span class="ikon">📈</span>İSTATİSTİK</button>
  </div>
</div>

<!-- EKRAN 3: İSTATİSTİK -->
<div class="ekran" id="ekran-istatistik">
  <div class="header">
    <h1>📈 İSTATİSTİKLER</h1>
  </div>
  <div class="scroll" id="istatistik-icerik"></div>
  <div class="alt-nav">
    <button class="nav-btn" onclick="sayfaGit('tahmin')"><span class="ikon">🎯</span>TAHMİN</button>
    <button class="nav-btn" onclick="sayfaGit('gecmis')"><span class="ikon">📋</span>GEÇMİŞ</button>
    <button class="nav-btn aktif" onclick="sayfaGit('istatistik')"><span class="ikon">📈</span>İSTATİSTİK</button>
  </div>
</div>

<!-- MODAL: SONUÇ GİR -->
<div class="modal-arka" id="modal-sonuc-gir">
  <div class="modal">
    <div class="modal-baslik">Gerçek Sonucu Gir</div>
    <div class="modal-mac" id="modal-mac-adi"></div>
    <div class="modal-butonlar" id="modal-butonlar"></div>
    <button class="btn btn-gri" onclick="modalKapat()">İptal</button>
  </div>
</div>

<script>
// ═══════════════════════════════════════
// VERİ
// ═══════════════════════════════════════
const TAKIMLAR = [
  "Galatasaray","Fenerbahçe","Beşiktaş","Trabzonspor",
  "Başakşehir","Sivasspor","Konyaspor","Antalyaspor",
  "Kayserispor","Kasımpaşa","Alanyaspor","Hatayspor",
  "Rizespor","Ankaragücü","Gaziantep FK","Samsunspor",
  "Bodrum FK","Eyüpspor","Çaykur Rizespor","Adana Demirspor"
];

// Takım güç skorları (genel tahmin için)
const GUCLER = {
  "Galatasaray":92,"Fenerbahçe":90,"Beşiktaş":82,"Trabzonspor":78,
  "Başakşehir":72,"Sivasspor":65,"Konyaspor":63,"Antalyaspor":61,
  "Kayserispor":59,"Kasımpaşa":58,"Alanyaspor":62,"Hatayspor":55,
  "Rizespor":53,"Ankaragücü":57,"Gaziantep FK":54,"Samsunspor":56,
  "Bodrum FK":52,"Eyüpspor":60,"Çaykur Rizespor":53,"Adana Demirspor":64
};

let sonSonuc = null;

// ═══════════════════════════════════════
// BAŞLANGIÇ
// ═══════════════════════════════════════
window.onload = () => {
  tarihGoster();
  takimlariDoldur();
};

function tarihGoster() {
  const t = new Date();
  document.getElementById('tarih-yazi').textContent =
    t.toLocaleDateString('tr-TR', { weekday:'long', day:'numeric', month:'long' });
}

function takimlariDoldur() {
  ['ev-takim','dep-takim'].forEach(id => {
    const sel = document.getElementById(id);
    TAKIMLAR.forEach(t => {
      const opt = document.createElement('option');
      opt.value = t; opt.textContent = t;
      sel.appendChild(opt);
    });
  });
}

// ═══════════════════════════════════════
// TAHMİN MOTORU
// ═══════════════════════════════════════
function tahminYap() {
  const ev = document.getElementById('ev-takim').value;
  const dep = document.getElementById('dep-takim').value;

  if (!ev || !dep) { alert('Lütfen iki takım seçin!'); return; }
  if (ev === dep) { alert('Aynı takımı iki kez seçemezsiniz!'); return; }

  const oran1 = parseFloat(document.getElementById('oran-1').value) || 0;
  const oranX = parseFloat(document.getElementById('oran-x').value) || 0;
  const oran2 = parseFloat(document.getElementById('oran-2').value) || 0;

  // Güç farkına dayalı baz olasılıklar
  const evGuc = (GUCLER[ev] || 65) + 5; // ev avantajı
  const depGuc = GUCLER[dep] || 65;
  const toplam = evGuc + depGuc;

  let pEv   = evGuc / toplam * 0.65;
  let pBer  = 0.25;
  let pDep  = depGuc / toplam * 0.55;

  // Normalize
  const topNorm = pEv + pBer + pDep;
  pEv  /= topNorm;
  pBer /= topNorm;
  pDep /= topNorm;

  // Oranlar varsa Implied Probability ile birleştir
  if (oran1 > 1 && oranX > 1 && oran2 > 1) {
    const ip1 = 1/oran1, ipX = 1/oranX, ip2 = 1/oran2;
    const ipTop = ip1 + ipX + ip2;
    const ip1n = ip1/ipTop, ipXn = ipX/ipTop, ip2n = ip2/ipTop;
    // %50 güç, %50 oran
    pEv  = pEv*0.5 + ip1n*0.5;
    pBer = pBer*0.5 + ipXn*0.5;
    pDep = pDep*0.5 + ip2n*0.5;
  }

  // En yüksek olasılıklı tahmin
  const maxP = Math.max(pEv, pBer, pDep);
  let tahmin, renk;
  if (maxP === pEv)  { tahmin = ev + ' Kazanır';  renk = 'ev-kazanir'; }
  else if (maxP === pBer) { tahmin = 'Beraberlik'; renk = 'beraberlik'; }
  else               { tahmin = dep + ' Kazanır'; renk = 'dep-kazanir'; }

  // Risk
  const entropi = -[pEv,pBer,pDep].filter(p=>p>0).reduce((s,p)=>s+p*Math.log2(p),0);
  const maxEntropi = Math.log2(3);
  const risk = Math.round((entropi / maxEntropi) * 100);
  const riskLabel = risk < 35 ? '🟢 DÜŞÜK' : risk < 65 ? '🟡 ORTA' : '🔴 YÜKSEK';

  // Arbitraj
  let arbMetin = 'Oran girilmedi';
  let arbSinif = '';
  if (oran1 > 1 && oranX > 1 && oran2 > 1) {
    const arb = (1/oran1 + 1/oranX + 1/oran2);
    const arbYuzde = ((1 - arb) * 100).toFixed(2);
    if (arb < 1) {
      arbMetin = `+${arbYuzde}% ✅ ARBİTRAJ VAR`;
      arbSinif = 'arb-pozitif';
    } else {
      arbMetin = `${arbYuzde}% (house edge: %${((arb-1)*100).toFixed(1)})`;
      arbSinif = 'arb-negatif';
    }
    document.getElementById('arb-kutu').className = 'arb-kutu ' + arbSinif;
  }

  // Göster
  document.getElementById('sonuc-mac-adi').textContent = `${ev} vs ${dep}`;
  const badge = document.getElementById('tahmin-badge');
  badge.textContent = tahmin;
  badge.className = 'tahmin-badge ' + renk;

  document.getElementById('sonuc-detay').innerHTML = `
    <div class="sonuc-satir">
      <span class="sonuc-etiket">EV KAZANIR</span>
      <span class="sonuc-deger" style="color:var(--yesil)">${(pEv*100).toFixed(0)}%</span>
    </div>
    <div class="sonuc-satir">
      <span class="sonuc-etiket">BERABERLİK</span>
      <span class="sonuc-deger" style="color:var(--sari)">${(pBer*100).toFixed(0)}%</span>
    </div>
    <div class="sonuc-satir">
      <span class="sonuc-etiket">DEP. KAZANIR</span>
      <span class="sonuc-deger" style="color:var(--kirmizi)">${(pDep*100).toFixed(0)}%</span>
    </div>
    <div class="sonuc-satir">
      <span class="sonuc-etiket">RİSK SEVİYESİ</span>
      <span class="sonuc-deger" style="font-size:13px">${riskLabel} (${risk}%)</span>
    </div>
  `;

  document.getElementById('arb-deger').textContent = arbMetin;
  document.getElementById('sonuc-kutu').classList.add('goster');

  sonSonuc = { ev, dep, tahmin, risk, pEv, pBer, pDep };
  document.getElementById('sonuc-kutu').scrollIntoView({ behavior: 'smooth' });
}

// ═══════════════════════════════════════
// SAYFA GEÇİŞİ
// ═══════════════════════════════════════
function sayfaGit(sayfa) {
  document.querySelectorAll('.ekran').forEach(e => e.classList.remove('aktif'));
  document.getElementById('ekran-' + sayfa).classList.add('aktif');
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('aktif'));
  event.currentTarget.classList.add('aktif');

  if (sayfa === 'gecmis') gecmisGoster();
  if (sayfa === 'istatistik') istatistikGoster();
}

// ═══════════════════════════════════════
// GEÇMİŞ
// ═══════════════════════════════════════
function gecmisKaydet(ev, dep, tahmin, gercek) {
  const gecmis = JSON.parse(localStorage.getItem('sl_gecmis') || '[]');
  gecmis.unshift({
    ev, dep, tahmin, gercek,
    tarih: new Date().toLocaleDateString('tr-TR'),
    dogru: gercek ? tahmin === gercek : null
  });
  localStorage.setItem('sl_gecmis', JSON.stringify(gecmis.slice(0, 100)));
}

function gecmisGoster() {
  const gecmis = JSON.parse(localStorage.getItem('sl_gecmis') || '[]');
  const div = document.getElementById('gecmis-liste');

  if (!gecmis.length) {
    div.innerHTML = '<div class="bos">Henüz tahmin yapılmadı 🎯</div>';
    return;
  }

  div.innerHTML = gecmis.map(g => `
    <div class="gecmis-kart">
      <div>
        <div class="gecmis-mac">${g.ev} vs ${g.dep}</div>
        <div class="gecmis-tarih">Tahmin: ${g.tahmin} · ${g.tarih}</div>
      </div>
      <span class="gecmis-badge ${g.gercek ? (g.dogru ? 'dogru':'yanlis') : 'bekliyor'}">
        ${g.gercek ? (g.dogru ? '✅ DOĞRU':'❌ YANLIŞ') : '⏳ BEKLE'}
      </span>
    </div>
  `).join('') + '<div style="height:20px"></div>';
}

function gecmisTemizle() {
  if (confirm('Tüm geçmiş silinsin mi?')) {
    localStorage.removeItem('sl_gecmis');
    gecmisGoster();
  }
}

// ═══════════════════════════════════════
// İSTATİSTİK
// ═══════════════════════════════════════
function istatistikGoster() {
  const gecmis = JSON.parse(localStorage.getItem('sl_gecmis') || '[]');
  const div = document.getElementById('istatistik-icerik');

  const toplam  = gecmis.length;
  const sonuclu = gecmis.filter(g => g.gercek !== null && g.gercek !== undefined);
  const dogru   = sonuclu.filter(g => g.dogru).length;
  const basari  = sonuclu.length ? Math.round(dogru / sonuclu.length * 100) : 0;

  div.innerHTML = `
    <div class="stat-grid">
      <div class="stat-kutu">
        <div class="stat-sayi" style="color:var(--vurgu)">${toplam}</div>
        <div class="stat-etiket">TOPLAM TAHMİN</div>
      </div>
      <div class="stat-kutu">
        <div class="stat-sayi" style="color:var(--yesil)">${dogru}</div>
        <div class="stat-etiket">DOĞRU TAHMİN</div>
      </div>
      <div class="stat-kutu">
        <div class="stat-sayi" style="color:${basari>=50?'var(--yesil)':'var(--kirmizi)'}">${basari}%</div>
        <div class="stat-etiket">BAŞARI ORANI</div>
      </div>
    </div>
    ${toplam === 0 ? '<div class="bos">İstatistik için tahmin yapın 📊</div>' : ''}
    <div style="height:20px"></div>
  `;
}

// ═══════════════════════════════════════
// SONUÇ GİR MODAL
// ═══════════════════════════════════════
function sonucGirAc() {
  if (!sonSonuc) return;
  document.getElementById('modal-mac-adi').textContent = `${sonSonuc.ev} vs ${sonSonuc.dep}`;
  document.getElementById('modal-butonlar').innerHTML = `
    <button class="btn btn-yesil" onclick="sonucKaydet('${sonSonuc.ev} Kazanır')">${sonSonuc.ev} Kazandı</button>
    <button class="btn btn-sari"  onclick="sonucKaydet('Beraberlik')">Beraberlik</button>
    <button class="btn btn-kirmizi" onclick="sonucKaydet('${sonSonuc.dep} Kazanır')">${sonSonuc.dep} Kazandı</button>
  `;
  document.getElementById('modal-sonuc-gir').classList.add('acik');
}

function sonucKaydet(gercek) {
  if (!sonSonuc) return;
  gecmisKaydet(sonSonuc.ev, sonSonuc.dep, sonSonuc.tahmin, gercek);
  modalKapat();
  sayfaGit('gecmis');
}

function modalKapat() {
  document.getElementById('modal-sonuc-gir').classList.remove('acik');
}
document.getElementById('modal-sonuc-gir').addEventListener('click', function(e) {
  if (e.target === this) modalKapat();
});

// ═══════════════════════════════════════
// İNDİRME BUTONU
// ═══════════════════════════════════════
function dosyaIndir() {
  const html = document.documentElement.outerHTML;
  const blob = new Blob([html], { type: 'text/html' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'superlig_tahmin.html';
  a.click();
  URL.revokeObjectURL(a.href);
}
</script>
</body>
